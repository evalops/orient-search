name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  bazel:
    name: Bazel checks and search gates
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Go for Bazelisk
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install Bazelisk
        run: |
          go install github.com/bazelbuild/bazelisk@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Install search tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep fd-find
          if ! command -v fd >/dev/null 2>&1 && command -v fdfind >/dev/null 2>&1; then
            sudo ln -s "$(command -v fdfind)" /usr/local/bin/fd
          fi

      - name: Build Bazel release binary
        run: bazel build -c opt //:orient

      - name: Smoke Bazel-built binary
        run: bazel test //:orient_bazel_smoke

      - name: Check formatting
        run: bazel run //:ci_fmt

      - name: Run full test suite
        run: bazel run //:ci_full_test

      - name: Smoke JSON-lines protocol
        run: bazel run //:ci_smoke

      - name: Gate search latency
        run: bazel run //:ci_perf_gates
